name: uat UI Automated Testing

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override base URL to check"
        required: false
        type: string

env:
  BASE_URL: ${{ inputs.base_url || secrets.UAT_BASE_URL }}

jobs:
  link-check:
    name: uat check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate BASE_URL is set
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "::error::BASE_URL is not set. Configure UAT_BASE_URL in GitHub Secrets or provide it via workflow_dispatch."
            exit 1
          fi
          echo "Checking: $BASE_URL"

      - name: Run uat
        run: |
          npx --yes __PACKAGE_SPEC__ check \
            --base-url "$BASE_URL" \
            --max-pages 300 \
            --concurrency 5 \
            --verbose \
            --exit-on-failure

  browser-check:
    name: uat browser check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright browsers
        run: npx --yes __PLAYWRIGHT_SPEC__ install --with-deps chromium

      - name: Validate BASE_URL is set
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "::error::BASE_URL is not set. Configure UAT_BASE_URL in GitHub Secrets or provide it via workflow_dispatch."
            exit 1
          fi
          echo "Checking: $BASE_URL"

      - name: Run uat + browser checks
        run: |
          npx --yes __PACKAGE_SPEC__ check \
            --base-url "$BASE_URL" \
            --max-pages 300 \
            --concurrency 5 \
            --verbose \
            --exit-on-failure \
            --browser
